</button>

<!-- Scroll test -->
<div class="box">Scroll dole →</div>

<script>
  // SCROLL 50%
  let scrolled = false;
  window.addEventListener('scroll', () => {
    const scrollPercent = (window.scrollY + window.innerHeight) / document.body.scrollHeight;
    if (!scrolled && scrollPercent > 0.5) {
      scrolled = true;
      track('scroll_50');
    }
  });
</script>
